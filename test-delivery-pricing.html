            const deliveryMode = document.getElementById('deliveryMode').value;
            const deliveryFee = getDeliveryFee(wilaya, deliveryMode);
            const productPrice = 3500;
            const totalPrice = productPrice + deliveryFee;

            results.innerHTML = `

                <div><strong>Total Price:</strong> ${totalPrice} DZD</div>
